<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Mototuf</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <a href="index.html" class="logo">Mototuf</a>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html" class="active">Shop</a></li>
                    <li><a href="cart.html">Cart <span id="cart-count-nav" class="cart-count">0</span></a></li>
                    <li><a href="orders.html">Orders</a></li>
                </ul>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </nav>

    <div class="container main-content">
        <div class="shop-header">
            <h1>All Products</h1>
            <div class="shop-controls">
                <input type="text" id="search-input" placeholder="Search products...">
                <select id="category-filter">
                    <option value="all">All Categories</option>
                    <option value="helmets">Helmets</option>
                    <option value="jackets">Jackets</option>
                    <option value="gloves">Gloves</option>
                    <option value="boots">Boots</option>
                    <option value="parts">Spare Parts</option>
                    <option value="lights">Bike Lights</option>
                    <option value="protective">Protective Gear</option>
                </select>
                <select id="sort-by">
                    <option value="default">Default</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                </select>
            </div>
        </div>

        <div id="products-grid" class="products-grid"></div>
        
        <!-- Pagination UI -->
        <div class="pagination" id="pagination">
            <button class="page-btn" data-page="1">1</button>
            <button class="page-btn" data-page="2">2</button>
            <button class="page-btn" data-page="3">3</button>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>Mototuf</h3>
                    <p>Your one-stop shop for motorcycle gear.</p>
                </div>
                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="shop.html">Shop</a></li>
                        <li><a href="cart.html">Cart</a></li>
                        <li><a href="orders.html">Orders</a></li>
                        <li><a href="dashboard.html">Admin</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 Mototuf. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script src="products.js"></script>
</body>
</html>
